name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate:
    name: Pre-Release Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify tag matches VERSION file
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match VERSION file $FILE_VERSION"
            exit 1
          fi
          echo "Tag matches VERSION: $TAG_VERSION"

      - name: Verify CHANGELOG has entry
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          if ! grep -q "\[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for version $VERSION"
            exit 1
          fi

      - name: Validate all JSON configs
        run: |
          for f in config/settings.json config/package.json config/gsd-file-manifest.json config/plugins/known_marketplaces.json config/mcp-configs/mcp-servers.json home-config/.claude.json; do
            [ -f "$f" ] && node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "[OK] $f"
          done

      - name: Validate all hook scripts
        run: |
          for f in config/hooks/*.js config/hooks/lib/*.js; do
            [ -f "$f" ] && node --check "$f" && echo "[OK] $f"
          done

  release:
    name: Create Release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog
        id: changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
